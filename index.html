<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Space</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#020617;
--neon:#00f7ff;
--neon2:#7c3aed;
--text:#e2e8f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at top, #0f172a, #020617);
color:var(--text);
font-family:"Inter",sans-serif;
height:100vh;
overflow-x:hidden;
}

/* 배경 네온 그라디언트 */

body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,var(--neon),transparent 70%);
filter:blur(200px);
top:-200px;
left:-200px;
opacity:0.2;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,var(--neon2),transparent 70%);
filter:blur(200px);
bottom:-200px;
right:-200px;
opacity:0.2;
z-index:-1;
}

/* navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:28px 8%;
backdrop-filter: blur(10px);
}

.logo{
font-family:"Orbitron";
font-size:22px;
letter-spacing:2px;
color:var(--neon);
text-shadow:0 0 10px var(--neon);
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-weight:500;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
left:0;
bottom:-4px;
background:var(--neon);
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* hero */

.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
font-family:"Orbitron";
background:linear-gradient(90deg,var(--neon),var(--neon2));
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px rgba(0,247,255,0.3);
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.7;
}

/* neon button */

.btn{
margin-top:35px;
padding:14px 30px;
border:1px solid var(--neon);
color:var(--neon);
background:transparent;
border-radius:10px;
cursor:pointer;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

.btn:hover{
background:var(--neon);
color:#020617;
box-shadow:
0 0 10px var(--neon),
0 0 40px var(--neon);
}

/* cards */

.section{
padding:80px 10%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.05);
transition:0.35s;
}

.card:hover{
transform:translateY(-6px);
border:1px solid var(--neon);
box-shadow:0 0 25px rgba(0,247,255,0.15);
}

.card h3{
margin-bottom:10px;
color:var(--neon);
}

/* footer */

footer{
text-align:center;
padding:40px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<nav>
<div class="logo">NEON</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">

<h1>NEON FUTURE</h1>

<p>Modern frontend aesthetic with neon interface.</p>

<button class="btn">Explore</button>

</section>

<section class="section">

<div class="grid">

<div class="card">
<h3>Fast</h3>
<p>Optimized modern layout and smooth animations.</p>
</div>

<div class="card">
<h3>Responsive</h3>
<p>Works across desktop, tablet and mobile devices.</p>
</div>

<div class="card">
<h3>Modern</h3>
<p>Glassmorphism + neon UI aesthetic.</p>
</div>

</div>

</section>

<footer>

© 2026 Neon Interface

</footer>

</body>
</html>
