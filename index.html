<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KillerServer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Pretendard:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--배경:#020617;
--네온:#ff003c;
--네온2:#7c3aed;
--텍스트:#e2e8f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at top, #0f172a, #020617);
color:var(--텍스트);
font-family:"Pretendard",sans-serif;
height:100vh;
overflow-x:hidden;
}

/* 네온 배경 */

body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,var(--네온),transparent 70%);
filter:blur(200px);
top:-200px;
left:-200px;
opacity:0.2;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,var(--네온2),transparent 70%);
filter:blur(200px);
bottom:-200px;
right:-200px;
opacity:0.2;
z-index:-1;
}

/* 메뉴 */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:28px 8%;
backdrop-filter: blur(10px);
}

.logo{
font-family:"Orbitron";
font-size:22px;
letter-spacing:2px;
color:var(--네온);
text-shadow:0 0 10px var(--네온);
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-weight:500;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
left:0;
bottom:-4px;
background:var(--네온);
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* 메인 */

.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
font-family:"Orbitron";
background:linear-gradient(90deg,var(--네온),var(--네온2));
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px rgba(255,0,60,0.3);
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.7;
}

/* 버튼 */

.btn{
margin-top:35px;
padding:14px 30px;
border:1px solid var(--네온);
color:var(--네온);
background:transparent;
border-radius:10px;
cursor:pointer;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

.btn:hover{
background:var(--네온);
color:#020617;
box-shadow:
0 0 10px var(--네온),
0 0 40px var(--네온);
}

/* 카드 */

.section{
padding:80px 10%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.05);
transition:0.35s;
}

.card:hover{
transform:translateY(-6px);
border:1px solid var(--네온);
box-shadow:0 0 25px rgba(255,0,60,0.2);
}

.card h3{
margin-bottom:10px;
color:var(--네온);
}

/* 푸터 */

footer{
text-align:center;
padding:40px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<nav>
<div class="logo">KILLER SERVER</div>

<ul>
<li><a href="#">홈</a></li>
<li><a href="#">서버</a></li>
<li><a href="#">디스코드</a></li>
<li><a href="#">문의</a></li>
</ul>
</nav>

<section class="hero">

<h1>KillerServer</h1>

<p>네온 스타일 커뮤니티 & 게임 서버</p>

<button class="btn">서버 참여</button>

</section>

<section class="section">

<div class="grid">

<div class="card">
<h3>게임 커뮤니티</h3>
<p>마인크래프트, 롤, 발로란트 등 다양한 게임을 함께 즐깁니다.</p>
</div>

<div class="card">
<h3>자유로운 분위기</h3>
<p>과한 규칙 없이 편하게 활동할 수 있는 커뮤니티.</p>
</div>

<div class="card">
<h3>24시간 활동</h3>
<p>아침형, 저녁형, 새벽형 유저 모두 환영합니다.</p>
</div>

</div>

</section>

<footer>

© 2026 KillerServer Community

</footer>

</body>
</html>
